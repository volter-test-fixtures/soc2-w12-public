schema: open-autonomy.soc2-evidence-ledger.v1
profile: soc2-baseline
note: >-
  Type-II evidence ledger. The cadence watchdog + check:soc2-register derive each periodic
  control's `last` from the ARTIFACT timestamps here (not self-report). A periodic control is
  OVERDUE when today > (latest artifact OR effective_from) + its cadence interval. Seed an
  artifact each interval (commit the evidence pointer) to keep a control current; a missing
  interval surfaces as overdue (the cardinal Type-II rule). effective_from is the install date
  (grace: a fresh install is not overdue until its first interval elapses).
