name: soc2-register-check
# W8 — the completeness + currency drift-guard, in the install's CI.
# Fails the build if: control-register.md is out of sync with control-register.yml (drift), any of the 61
# AICPA TSC criteria is unmapped / missing its class obligations (structural), or any periodic control's
# latest ledger artifact is older than its cadence (currency). Runs on every PR/push that touches the
# register, ledger, or the tool.
on:
  pull_request:
    paths: ["compliance/control-register.yml", "compliance/control-register.md", "compliance/evidence-ledger.yml", "scripts/soc2-register.ts"]
  push:
    branches: [main]
    paths: ["compliance/control-register.yml", "compliance/control-register.md", "compliance/evidence-ledger.yml", "scripts/soc2-register.ts"]
  schedule:
    - cron: "41 7 * * 1"   # weekly — so the CURRENCY gate runs on the calendar (time-lapse), not only on a register/ledger diff
  workflow_dispatch: {}
permissions:
  contents: read
  issues: write
  actions: read
jobs:
  soc2-register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with: { bun-version: latest }
      - name: register drift guard (md == yaml)
        run: |
          bun add yaml@^2 >/dev/null 2>&1 || true
          bun scripts/soc2-register.ts verify
      - name: structural + currency gates (all 61 criteria mapped; no overdue ledger interval)
        run: bun scripts/soc2-register.ts check
      # independent watcher #2 (B-F2): this workflow watches compliance-cadence.yml, and compliance-cadence.yml
      # watches THIS workflow back (its liveness loop includes soc2-register-check.yml) — genuinely mutual, so
      # neither can die silently for an INDIVIDUAL stall. (A wholesale Actions-disable kills both at once — see
      # the register "Honest limits": that terminal case needs external monitoring.) heartbeat.yml (separate,
      # watches pm.yml) is a third independent schedule.
      - name: cross-watch — flag a stalled compliance-cadence workflow
        if: github.event_name == 'schedule'
        env: { GH_TOKEN: "${{ github.token }}", REPO: "${{ github.repository }}" }
        run: |
          last=$(gh api "repos/${REPO}/actions/workflows/compliance-cadence.yml/runs?status=success&per_page=1" --jq '.workflow_runs[0].updated_at // empty' 2>/dev/null || echo "")
          if [ -n "$last" ]; then
            age=$(( ( $(date -u +%s) - $(date -u -d "$last" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$last" +%s) ) / 3600 ))
            if [ "$age" -gt 192 ]; then
              title="[soc2-watchdog-stale] compliance-cadence has not run successfully in ${age}h"
              gh issue list --repo "$REPO" --state open --label soc2-watchdog-stale --json title --jq '.[].title' | grep -qF "$title" || {
                gh label create soc2-watchdog-stale --repo "$REPO" --color b60205 --force >/dev/null 2>&1 || true
                gh issue create --repo "$REPO" --title "$title" --body "The cross-watcher (soc2-register-check) found compliance-cadence.yml stale (${age}h > 192h). Re-enable it — periodic controls can lapse invisibly." --label soc2-watchdog-stale
              }
            fi
          fi
