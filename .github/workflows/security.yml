name: Security
# Standard code-host CI resource — installed into every github-hosted open-autonomy install (a resource,
# like the standards docs; not engine output). Scans the workflows (zizmor, against .github/zizmor.yml) and
# the dependency lockfiles (integrity + audit) on push to main, PRs, and weekly. A bot-authored agent PR
# doesn't fire pull_request (GITHUB_TOKEN anti-recursion), so this net catches on merge-to-main + schedule.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile || bun install
      - name: Supply-chain (lockfile integrity + bun audit)
        run: bun scripts/check-supply-chain.ts
      - name: Workflow static analysis (zizmor)
        run: pipx run zizmor==1.26.1 --offline --min-severity high .github/workflows/
