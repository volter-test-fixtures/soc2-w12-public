name: CodeQL
# Semantic static analysis of our own TS (injection, path-traversal, unsafe data flow). Findings land
# in the repo Security tab. Runs on push to main (post-merge), human PRs, and weekly — NOT as a per-PR
# required status, because bot-authored agent PRs don't fire pull_request (GITHUB_TOKEN anti-recursion);
# zizmor + the reviewer agent + check:security cover the agent-PR path.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"
permissions:
  contents: read
jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: javascript-typescript
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:javascript-typescript"
