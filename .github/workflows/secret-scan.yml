name: secret-scan
# C12 as a no-signup, no-GHAS BLOCKING required check on bot PRs: gitleaks (free, no account) scans the head
# for committed secrets and posts a `secret-scan` commit status. Dispatched by the proposer effect (a bot PR
# fires no pull_request). Works on PRIVATE repos with zero signup — the self-managed alternative to GitHub
# secret scanning (which needs GHAS on private).
on:
  workflow_dispatch:
    inputs:
      sha: { description: "head SHA to scan + post the status on", required: true, type: string }
      pr: { description: "PR number (context only)", required: false, type: string }
permissions:
  contents: read
  statuses: write
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.sha }}
      - name: Post pending
        env: { GH_TOKEN: "${{ github.token }}", SHA: "${{ github.event.inputs.sha }}" }
        run: gh api -X POST "repos/{owner}/{repo}/statuses/${SHA}" -f state=pending -f context=secret-scan -f description="scanning for committed secrets (gitleaks)" >/dev/null
      - name: gitleaks scan + post result
        env: { GH_TOKEN: "${{ github.token }}", SHA: "${{ github.event.inputs.sha }}" }
        run: |
          set +e
          url="$(gh api repos/gitleaks/gitleaks/releases/latest --jq '.assets[]|select(.name|test("linux_x64.tar.gz$"))|.browser_download_url' | head -1)"
          curl -sSL "$url" | tar xz gitleaks && chmod +x gitleaks
          ./gitleaks detect --source . --no-git --redact --no-banner; rc=$?
          if [ "$rc" -eq 0 ]; then state=success; desc="no committed secrets detected (gitleaks)"; else state=failure; desc="gitleaks found committed secret(s)"; fi
          gh api -X POST "repos/{owner}/{repo}/statuses/${SHA}" -f state="$state" -f context=secret-scan -f description="$desc" >/dev/null
          [ "$state" = success ]
