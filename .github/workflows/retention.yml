name: retention
# C14 (Confidentiality/Privacy / CC6) — enforce the documented transcript retention period. Agent run
# transcripts (.open-autonomy/history/**) capture truncated source code permanently in git; the data-
# classification & retention policy (compliance/policies/data-classification-and-retention-policy.md) sets a
# retention window. This sweep finds transcripts older than RETENTION_DAYS and proposes their deletion as a
# normal gated PR — it does NOT force-push to main. Because .open-autonomy/** is a human-required path, the
# deletion PR parks for a maintainer Approve (deletions of records are themselves change-managed). Default
# 365 days; override with the PUBLIC_AGENT_TRANSCRIPT_RETENTION_DAYS repo variable.
on:
  schedule:
    - cron: "23 5 1 * *"   # 05:23 on the 1st of each month
  workflow_dispatch:
    inputs:
      days: { description: "retention days (override)", required: false, type: string }
permissions:
  contents: write
  pull-requests: write
jobs:
  retention:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # full history — the sweep ages files by GIT commit date, not filesystem mtime
      - name: Sweep expired transcripts → gated deletion PR
        env:
          GH_TOKEN: ${{ github.token }}
          DAYS: ${{ github.event.inputs.days || vars.PUBLIC_AGENT_TRANSCRIPT_RETENTION_DAYS || '365' }}
        run: |
          set -euo pipefail
          hist=".open-autonomy/history"
          [ -d "$hist" ] || { echo "no $hist — nothing to sweep"; exit 0; }
          cutoff=$(( $(date -u +%s) - DAYS*86400 ))
          # Age each transcript by its LAST GIT COMMIT date (authored), NOT filesystem mtime — checkout resets
          # mtime to ~now, so an mtime sweep can never find old files in CI. git log gives the real content age.
          old=()
          while IFS= read -r f; do
            [ -n "$f" ] || continue
            ts="$(git log -1 --format=%at -- "$f" 2>/dev/null || echo '')"
            [ -n "$ts" ] && [ "$ts" -lt "$cutoff" ] && old+=("$f")
          done < <(git ls-files "$hist")
          if [ "${#old[@]}" -eq 0 ]; then echo "no transcripts older than ${DAYS}d (by git commit date)"; exit 0; fi
          echo "expiring ${#old[@]} file(s) older than ${DAYS}d"
          branch="retention/sweep-$(date -u +%Y%m%d)"
          git config user.name "open-autonomy-retention[bot]"
          git config user.email "retention@users.noreply.github.com"
          git checkout -b "$branch"
          for f in "${old[@]}"; do git rm -q "$f"; done
          git commit -m "retention: expire ${#old[@]} transcript(s) older than ${DAYS}d"
          git push origin "$branch"
          gh pr create --base "${{ github.event.repository.default_branch }}" --head "$branch" \
            --title "retention: expire ${#old[@]} transcript(s) (>${DAYS}d)" \
            --body "Automated retention sweep per compliance/policies/data-classification-and-retention-policy.md. Deletes agent transcripts older than ${DAYS} days. This PR touches .open-autonomy/** (a human-required path) so a maintainer Approve is required before it merges — record deletions are change-managed." \
            --label human-required || echo "::warning::could not open PR (label/branch may already exist)"
