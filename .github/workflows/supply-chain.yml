name: supply-chain
# C7 as a BLOCKING required check on bot PRs (the gap the auditor flagged). The proposer effect dispatches
# this with the PR head sha (a bot PR fires no pull_request, so it must be kicked to post its required status
# — see scripts/agent-propose.ts EXTRA_CHECK_WORKFLOWS). It checks out the head, runs the supply-chain gate
# (lockfile integrity + bun audit), and posts a `supply-chain` commit status on that sha. Native auto-merge
# waits for it. The monitoring `security.yml` still runs on push/PR/weekly; this is its dispatched, blocking
# realization for the agent-PR path.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: "head SHA to gate + post the status on"
        required: true
        type: string
      pr:
        description: "PR number (context only)"
        required: false
        type: string
permissions:
  contents: read
  statuses: write
jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.inputs.sha }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10
      - name: Post pending status
        env: { GH_TOKEN: "${{ github.token }}", SHA: "${{ github.event.inputs.sha }}" }
        run: gh api -X POST "repos/{owner}/{repo}/statuses/${SHA}" -f state=pending -f context=supply-chain -f description="checking lockfile integrity + advisories" >/dev/null
      - name: Run supply-chain gate + post result
        env: { GH_TOKEN: "${{ github.token }}", SHA: "${{ github.event.inputs.sha }}" }
        run: |
          set +e   # we handle every exit code + ALWAYS post a final status (never leave it stuck pending)
          if [ ! -f bun.lock ] && [ ! -f package.json ]; then
            gh api -X POST "repos/{owner}/{repo}/statuses/${SHA}" -f state=success -f context=supply-chain -f description="no JS lockfile in this repo — nothing to verify" >/dev/null
            exit 0
          fi
          bun install --frozen-lockfile || bun install || true
          if bun scripts/check-supply-chain.ts; then state=success; desc="lockfiles registry-pinned + no known advisories"; else state=failure; desc="supply-chain gate failed (integrity or advisory)"; fi
          gh api -X POST "repos/{owner}/{repo}/statuses/${SHA}" -f state="$state" -f context=supply-chain -f description="$desc" >/dev/null
          [ "$state" = success ]
